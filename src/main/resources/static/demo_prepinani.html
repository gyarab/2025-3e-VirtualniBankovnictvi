<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo bankovnictví</title>

    <link id="themeStylesheet" rel="stylesheet" href="css/KB/app.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
        }

        header {
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            margin-left: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .card {
            padding: 20px;
            border-radius: 12px;
            background: #f9f9f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .account-card {
            cursor: pointer;
            transition: 0.2s ease;
        }

        .account-card:hover {
            transform: translateY(-4px);
        }

        .account-card.active {
            border: 2px solid #0070f3;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .card-subtext {
            font-size: 14px;
            opacity: 0.7;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .transaction-negative {
            color: #d11a2a;
        }

        .transaction-positive {
            color: #1a8f3c;
        }

        .badge {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 6px;
            background: #eee;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<header>
    <div class="container header-inner">
        <div class="logo"><strong>Moje banka</strong></div>
        <nav>
            <a href="#">Účty</a>
            <a href="#">Platby</a>
            <a href="#">Karty</a>
            <a href="#">Profil</a>
            <a href="#" id="stylLink" onclick="toggleTheme(); return false;">
                Přepnout na ČS
            </a>
        </nav>
    </div>
</header>

<main class="container">

    <!-- Přehled účtů -->
    <div class="accounts-grid" id="accountsGrid"></div>

    <!-- Transakce -->
    <div class="card">
        <div class="card-title">Poslední transakce</div>
        <table class="table">
            <thead>
            <tr>
                <th>Datum</th>
                <th>Popis</th>
                <th>Částka</th>
                <th>Stav</th>
            </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
        </table>
    </div>

</main>

<footer>
    © 2026 Demo internetového bankovnictví
</footer>

<script>
    const accounts = {
        personal: {
            name: "Osobní účet",
            number: "123456789/0100",
            iban: "CZ65 0100 0000 0012 3456 7890",
            balance: "124 580 Kč",
            available: "119 340 Kč",
            transactions: [
                ["22. 2. 2026","Platba kartou – Alza.cz","-1 240 Kč","Zaúčtováno","negative"],
                ["21. 2. 2026","Příchozí platba","+8 500 Kč","Přijato","positive"]
            ]
        },
        savings: {
            name: "Spořicí účet",
            number: "987654321/0100",
            iban: "CZ12 0100 0000 0098 7654 3210",
            balance: "540 000 Kč",
            available: "540 000 Kč",
            transactions: [
                ["1. 2. 2026","Úrok","+1 200 Kč","Přijato","positive"]
            ]
        },
        business: {
            name: "Podnikatelský účet",
            number: "555888999/0300",
            iban: "CZ88 0300 0000 0055 5888 9999",
            balance: "1 240 800 Kč",
            available: "1 100 500 Kč",
            transactions: [
                ["25. 2. 2026","Faktura – Dodavatel","-45 000 Kč","Odesláno","negative"]
            ]
        }
    };

    let activeAccount = "personal";

    function renderAccounts() {
        const grid = document.getElementById("accountsGrid");
        grid.innerHTML = "";

        Object.keys(accounts).forEach(key => {
            const acc = accounts[key];

            grid.innerHTML += `
            <div class="card account-card ${key === activeAccount ? "active" : ""}"
                 onclick="selectAccount('${key}')">

                <div class="card-title">${acc.name}</div>

                <div style="font-size:14px; opacity:0.7; margin-bottom:10px;">
                    ${acc.number}<br>
                    ${acc.iban}
                </div>

                <div class="card-value">${acc.balance}</div>

                <div class="card-subtext">
                    Disponibilní: ${acc.available}
                </div>
            </div>
        `;
        });
    }

    function selectAccount(key) {
        activeAccount = key;
        renderAccounts();
        renderTransactions();
    }

    function renderTransactions() {
        const tbody = document.getElementById("transactionsBody");
        tbody.innerHTML = "";

        accounts[activeAccount].transactions.forEach(t => {
            tbody.innerHTML += `
            <tr>
                <td>${t[0]}</td>
                <td>${t[1]}</td>
                <td class="transaction-${t[4]}">${t[2]}</td>
                <td><span class="badge">${t[3]}</span></td>
            </tr>
        `;
        });
    }

    function toggleTheme() {
        const stylesheet = document.getElementById("themeStylesheet");
        const stylLink = document.getElementById("stylLink");

        if (stylesheet.getAttribute("href") === "css/KB/app.css") {
            stylesheet.setAttribute("href", "css/CS/app.css");
            stylLink.textContent = "Přepnout na KB";
        } else {
            stylesheet.setAttribute("href", "css/KB/app.css");
            stylLink.textContent = "Přepnout na ČS";
        }
    }

    window.onload = function() {
        renderAccounts();
        renderTransactions();
    };
</script>

</body>
</html>
