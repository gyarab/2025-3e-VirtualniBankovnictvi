<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>George | Vítejte</title>
  <style>
    :root {
      --g-warm-blue: #1a56ff;
      --g-cyan: #00d9ff;
      --bg-warm: #f2f5f9;
    }

    body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg-warm); }

    header {
      background: var(--g-warm-blue);
      color: white;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(26, 86, 255, 0.2);
    }

    .logo-container { display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; }
    .logo-circle {
      width: 38px; height: 38px; background: var(--g-cyan); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 22px; border: 2px solid white;
    }

    /* Odkaz na Sandbox */
    .sandbox-badge {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }
    .sandbox-badge:hover { background: rgba(255, 255, 255, 0.25); }

    .login-box {
      max-width: 420px; margin: 100px auto; background: white;
      padding: 45px; border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08); text-align: center;
    }

    h2 { color: var(--g-warm-blue); margin-bottom: 10px; font-size: 28px; }
    p.subtitle { color: #718096; margin-bottom: 35px; font-size: 15px; }

    input {
      width: 100%; padding: 16px; margin-bottom: 18px;
      border: 2px solid #eef2f7; border-radius: 15px;
      font-size: 16px; outline: none; transition: 0.3s;
      box-sizing: border-box;
    }

    input:focus { border-color: var(--g-warm-blue); box-shadow: 0 0 0 4px rgba(26, 86, 255, 0.1); }

    /* Vizuální upozornění na chybu (pokud se uživatel pokusí odeslat) */
    input:invalid:not(:placeholder-shown) { border-color: #e74c3c; }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: 15px;
      font-weight: 700; cursor: pointer; background: var(--g-warm-blue);
      color: white; font-size: 17px; transition: 0.3s;
    }

    .btn:hover { background: #0040ff; transform: translateY(-2px); }

    .error-msg { color: #e74c3c; font-size: 13px; margin-top: -10px; margin-bottom: 15px; display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-circle">G</div>
      <div style="font-weight:700; font-size:24px;">George</div>
    </div>
    <a href="sandbox.html" class="sandbox-badge">Vyzkoušet Sandbox</a>
  </header>

  <div class="login-box">
    <h2>Vítejte</h2>
    <p class="subtitle">Přihlaste se do svého bankovnictví</p>

    <form id="loginForm" onsubmit="return validateAndLogin(event)">
      <input type="email" id="emailInput" placeholder="E-mail (např. jmeno@domena.cz)"
             required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
      <div id="emailError" class="error-msg">Zadejte prosím platný e-mail (chybí @ nebo tečka).</div>

      <input type="password" placeholder="Heslo" required>

      <button type="submit" class="btn">PŘIHLÁSIT SE</button>
    </form>

    <div style="margin-top: 25px; font-size: 13px; color: #a0aec0;">
      Zapomněli jste heslo? <a href="#" style="color: var(--g-warm-blue); text-decoration: none;">Klikněte zde</a>
    </div>
  </div>

  <script>
    function validateAndLogin(event) {
      event.preventDefault();
      const emailInput = document.getElementById('emailInput');
      const errorMsg = document.getElementById('emailError');
      const emailValue = emailInput.value;

      // Dvojitá kontrola pomocí JavaScriptu pro jistotu
      if (!emailValue.includes('@') || !emailValue.includes('.')) {
        errorMsg.style.display = 'block';
        emailInput.style.borderColor = '#e74c3c';
        return false;
      }

      errorMsg.style.display = 'none';

      // Úspěšné přihlášení -> přesun na dashboard
      window.location.href = 'ucet.html';
      return true;
    }
  </script>

</body>
</html>
