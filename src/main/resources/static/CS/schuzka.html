<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Sjednat schůzku | George</title>
  <style>
    :root { --g-blue: #1a56ff; --g-cyan: #00d9ff; --bg: #f4f7fa; }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); }

    nav { background: var(--g-blue); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
    .logo-container { display: flex; align-items: center; gap: 10px; font-weight: bold; text-decoration: none; color: white; }
    .logo-circle { width: 30px; height: 30px; background: var(--g-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

    .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }
    .card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }

    .banker-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 5px solid var(--g-cyan); margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

    h2 { color: var(--g-blue); margin: 0 0 5px 0; }
    /* Aktualizovaný popisek odborníka */
    .banker-name { font-weight: bold; color: #4a5568; margin-bottom: 25px; display: block; }

    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #4a5568; }

    input, select {
      width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box;
    }
    input:focus, select:focus { border-color: var(--g-blue); }

    .btn-submit {
      background: var(--g-blue); color: white; border: none; width: 100%;
      padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26, 86, 255, 0.3); }
  </style>
</head>
<body>

<nav>
  <a href="ucet.html" class="logo-container">
    <div class="logo-circle">G</div>
    <span>George</span>
  </a>
  <a href="ucet.html" style="color:white; text-decoration:none; font-weight:600;">Zpět na účet</a>
</nav>

<div class="container">
  <div class="card">
    <img src="jonny_sins_in_suit.jpeg" alt="Odborník Johnny Sins" class="banker-img">
    <h2>Schůzka s odborníkem</h2>
    <span class="banker-name">Johnny Sins - Specialista nejen na finance</span>

    <form onsubmit="alert('Odborník Johnny Sins se na vás těší!'); window.location.href='ucet.html'; return false;">
      <div class="form-group">
        <label>Datum schůzky</label>
        <input type="date" id="meetingDate" required onchange="filterTimes()">
      </div>

      <div class="form-group">
        <label>Čas</label>
        <select id="meetingTime" required>
          <option value="">Vyberte čas...</option>
          <option value="09:00">09:00</option>
          <option value="10:30">10:30</option>
          <option value="13:00">13:00</option>
          <option value="15:30">15:30</option>
          <option value="17:00">17:00</option>
        </select>
      </div>

      <div class="form-group">
        <label>Téma schůzky</label>
        <select required>
          <option>Hypotéka a bydlení</option>
          <option>Investice a zhodnocení</option>
          <option>Pojištění</option>
          <option>Osobní bankovnictví</option>
        </select>
      </div>

      <button type="submit" class="btn-submit">POTVRDIT TERMÍN</button>
    </form>
  </div>
</div>

<script>
  const allTimes = ["09:00", "10:30", "13:00", "15:30", "17:00"];

  function filterTimes() {
    const dateInput = document.getElementById('meetingDate');
    const timeSelect = document.getElementById('meetingTime');
    const today = new Date();

    const selectedDateStr = dateInput.value;
    const todayStr = today.toISOString().split('T')[0];
    const isToday = selectedDateStr === todayStr;

    timeSelect.innerHTML = '<option value="">Vyberte čas...</option>';

    allTimes.forEach(time => {
      if (isToday) {
        const [hours, minutes] = time.split(':').map(Number);
        const timeToCheck = new Date();
        timeToCheck.setHours(hours, minutes, 0, 0);

        if (timeToCheck > today) {
          addOption(timeSelect, time);
        }
      } else {
        addOption(timeSelect, time);
      }
    });
  }

  function addOption(select, time) {
    const opt = document.createElement('option');
    opt.value = time;
    opt.innerHTML = time;
    select.appendChild(opt);
  }

  window.onload = function() {
    const dateInput = document.getElementById('meetingDate');
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');

    const minDate = `${year}-${month}-${day}`;
    dateInput.setAttribute('min', minDate);
    dateInput.value = minDate;

    filterTimes();
  };
</script>

</body>
</html>
