<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Můj George | Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --g-blue: #1a56ff; --g-cyan: #00d9ff; --g-green: #2ecc71; --g-purple: #9b59b6; --bg: #f0f4f8;
    }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); overflow-x: hidden; }

    /* Horní navigace */
    nav {
      background: var(--g-blue); color: white; padding: 15px 40px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-container { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; }
    .logo-circle { width: 30px; height: 30px; background: var(--g-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; color: white; }

    .nav-links { display: flex; gap: 20px; align-items: center; }
    .btn-schuzka {
      background: rgba(255,255,255,0.2); color: white; text-decoration: none;
      padding: 8px 20px; border-radius: 20px; font-weight: 600; transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .btn-schuzka:hover { background: white; color: var(--g-blue); }

    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

    /* Dashboard Grid - Fixní 3 sloupce */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      transition: all 0.5s ease-in-out;
    }

    .card {
      background: white; border-radius: 24px; padding: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05); cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 260px; display: flex; flex-direction: column;
      position: relative; border: 2px solid transparent;
      overflow: hidden;
    }

    /* FOCUS REŽIM: Pouze pro JEDNU kartu najednou */
    .card.active-focus {
      grid-column: 1 / -1; /* Roztáhne se přes celou šířku (všechny 3 sloupce) */
      height: 450px;
      border-color: var(--g-blue);
      box-shadow: 0 20px 40px rgba(26, 86, 255, 0.15);
      cursor: default;
    }

    /* Ostatní karty se v mřížce pod zvětšenou kartou zmenší */
    .dashboard-grid.has-focus .card:not(.active-focus) {
      height: 140px;
      opacity: 0.6;
      transform: scale(0.96);
    }

    .acc-label { font-size: 11px; color: #a0aec0; text-transform: uppercase; font-weight: 800; }
    .acc-balance { font-size: 26px; font-weight: 900; margin: 5px 0; }
    .chart-box { flex-grow: 1; min-height: 0; margin-top: 10px; }

    .hint { color: #718096; font-size: 13px; margin-bottom: 15px; }
  </style>
</head>
<body>

<nav>
  <div class="logo-container">
    <div class="logo-circle">G</div>
    <span>George</span>
  </div>
  <div class="nav-links">
    <a href="schuzka.html" class="btn-schuzka">Sjednat schůzku</a>
    <a href="odhlaseni.html" style="color:white; text-decoration:none; font-size: 14px;">Odhlásit</a>
  </div>
</nav>

<div class="container">
  <div class="hint">Klikněte na účet pro zvětšený detailní náhled</div>

  <div class="dashboard-grid" id="mainGrid">

    <div class="card" onclick="focusCard(this, 'p')">
      <div class="acc-label">Osobní účet</div>
      <div class="acc-balance" style="color:var(--g-blue)">145 280 Kč</div>
      <div class="chart-box"><canvas id="chartP"></canvas></div>
    </div>

    <div class="card" onclick="focusCard(this, 's')">
      <div class="acc-label">Spořicí účet</div>
      <div class="acc-balance" style="color:var(--g-green)">520 400 Kč</div>
      <div class="chart-box"><canvas id="chartS"></canvas></div>
    </div>

    <div class="card" onclick="focusCard(this, 'i')">
      <div class="acc-label">Majetkový účet</div>
      <div class="acc-balance" style="color:var(--g-purple)">89 000 Kč</div>
      <div class="chart-box"><canvas id="chartI"></canvas></div>
    </div>

  </div>
</div>

<script>
  const charts = {};

  function getConfig(data, color) {
    return {
      type: 'line',
      data: {
        labels: ['1.3.', '2.3.', '3.3.', '4.3.', '5.3.'],
        datasets: [{
          data: data,
          borderColor: color,
          backgroundColor: color + '15',
          fill: true, tension: 0.4, borderWidth: 4, pointRadius: 5, pointHoverRadius: 10, pointBackgroundColor: '#fff', pointBorderWidth: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            callbacks: { label: (ctx) => ` ${ctx.raw.toLocaleString()} Kč` }
          }
        },
        scales: { x: { grid: { display: false } }, y: { display: false } }
      }
    };
  }

  function focusCard(card, id) {
    const grid = document.getElementById('mainGrid');
    const isAlreadyActive = card.classList.contains('active-focus');

    // KROK 1: Resetujeme všechny karty (vždy jen jedna může být focus)
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active-focus'));
    grid.classList.remove('has-focus');

    // KROK 2: Pokud karta nebyla aktivní, aktivujeme ji
    if (!isAlreadyActive) {
      card.classList.add('active-focus');
      grid.classList.add('has-focus');
    }

    // KROK 3: Překreslení grafů do nových rozměrů s mírným zpožděním kvůli CSS animaci
    setTimeout(() => {
      Object.values(charts).forEach(c => c.resize());
    }, 450);
  }

  window.onload = () => {
    charts.p = new Chart(document.getElementById('chartP'), getConfig([142000, 148000, 141000, 146000, 145280], '#1a56ff'));
    charts.s = new Chart(document.getElementById('chartS'), getConfig([510000, 512000, 515000, 518000, 520400], '#2ecc71'));
    charts.i = new Chart(document.getElementById('chartI'), getConfig([75000, 92000, 81000, 85000, 89000], '#9b59b6'));
  };
</script>

</body>
</html>
